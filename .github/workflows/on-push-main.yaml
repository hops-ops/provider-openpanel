name: on-push-main

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write
  id-token: write

env:
  PACKAGE_PLATFORMS: linux_amd64 linux_arm64

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
          cache: true
      - run: go mod download
      - run: go build -v ./...
      - run: go vet ./...
      - name: Run linters
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: latest
          args: --timeout 10m

  xpkg-build:
    name: Build multi-platform xpkg
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@49b3bc8e6bdd4a60e6116a5414239cba5943d3cf # v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build linux xpkgs
        run: make build.all PLATFORMS="${PACKAGE_PLATFORMS}" VERSION=v0.0.0

      - name: Check package artifacts
        run: |
          set -euo pipefail
          for platform in ${PACKAGE_PLATFORMS}; do
            test -f "_output/xpkg/${platform}/provider-openpanel-v0.0.0.xpkg"
          done

  version-and-tag:
    name: Version and Tag
    needs:
      - build
      - xpkg-build
    uses: unbounded-tech/workflow-vnext-tag/.github/workflows/workflow.yaml@7ad6b7bb2461beb5d78b0d8b7cfbd66b251bbb1d # v1.21.0
    secrets:
      DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
    with:
      useDeployKey: true
