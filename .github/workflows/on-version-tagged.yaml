name: on-version-tagged

# Fires on tags pushed by the vnext version-and-tag workflow.
# Two jobs:
#   1. release — GitHub release notes via the simple-release workflow.
#   2. xpkg   — build the Crossplane provider package and push it to
#               ghcr.io/hops-ops/provider-openpanel:<tag>.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    uses: unbounded-tech/workflow-simple-release/.github/workflows/workflow.yaml@v2.1.1
    with:
      tag: ${{ github.ref_name }}
      name: ${{ github.ref_name }}

  xpkg:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Install Crossplane CLI
        run: |
          curl -sL https://raw.githubusercontent.com/crossplane/crossplane/master/install.sh | XP_CHANNEL=stable sh
          sudo mv ./crossplane /usr/local/bin/
          crossplane version

      - name: Set up QEMU
        uses: docker/setup-qemu-action@49b3bc8e6bdd4a60e6116a5414239cba5943d3cf # v3.6.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive version from tag
        id: version
        run: |
          # strip the leading "v" so VERSION matches the xpkg image tag
          # the rest of the build pipeline already expects.
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Build the xpkg + provider runtime image
        run: |
          make build VERSION="v${VERSION}" 2>&1 | tail -50
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Push xpkg to GHCR
        run: |
          # `make build` produces _output/xpkg/<platform>/<file>.xpkg.
          # Push them via the Crossplane CLI; tag matches the GitHub
          # release tag verbatim so consumers can `kubectl apply`
          # a Provider manifest pinned to `:v0.1.0` etc.
          shopt -s nullglob
          xpkgs=(_output/xpkg/linux_amd64/*.xpkg _output/xpkg/linux_arm64/*.xpkg)
          if [ ${#xpkgs[@]} -eq 0 ]; then
            echo "::error::no xpkg artifacts produced by make build"
            ls -la _output/ _output/xpkg/ 2>&1 || true
            exit 1
          fi
          IMAGE="ghcr.io/${{ github.repository }}"
          for xpkg in "${xpkgs[@]}"; do
            echo "Pushing $xpkg to ${IMAGE}:v${VERSION}"
            crossplane xpkg push "${IMAGE}:v${VERSION}" -f "$xpkg"
          done
        env:
          VERSION: ${{ steps.version.outputs.version }}
