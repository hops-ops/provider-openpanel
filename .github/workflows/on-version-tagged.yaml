name: on-version-tagged

# Fires on tags pushed by the vnext version-and-tag workflow.
# Two jobs:
#   1. release — GitHub release notes via the simple-release workflow.
#   2. xpkg   — build the Crossplane provider package and push it to
#               ghcr.io/hops-ops/provider-openpanel:<tag>.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

env:
  PACKAGE_PLATFORMS: linux_amd64 linux_arm64

jobs:
  release:
    uses: unbounded-tech/workflow-simple-release/.github/workflows/workflow.yaml@d577e3b6df67795ece619270377bb551703cf2fe # v2.1.3
    with:
      tag: ${{ github.ref_name }}
      name: ${{ github.ref_name }}

  xpkg:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: recursive
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Install Crossplane CLI
        run: |
          # Pin version explicitly — `XP_CHANNEL=stable` resolves a
          # `current` pointer that periodically goes missing
          # ("version current exists on channel stable" error).
          curl -sL https://raw.githubusercontent.com/crossplane/crossplane/master/install.sh | XP_VERSION=v2.0.2 sh
          sudo mv ./crossplane /usr/local/bin/
          # `crossplane version` hits the cluster for the server
          # version; we don't have a kubeconfig in CI. `xpkg --help`
          # confirms the binary works without making a cluster call.
          crossplane xpkg --help >/dev/null

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive version from tag
        id: version
        run: |
          # strip the leading "v" so VERSION matches the xpkg image tag
          # the rest of the build pipeline already expects.
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Build the xpkg + provider runtime image
        run: |
          make build.all PLATFORMS="${PACKAGE_PLATFORMS}" VERSION="v${VERSION}"
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Push xpkg to GHCR
        run: |
          # `make build` produces _output/xpkg/<platform>/<file>.xpkg.
          # Push them via the Crossplane CLI; tag matches the GitHub
          # release tag verbatim so consumers can `kubectl apply`
          # a Provider manifest pinned to `:v0.1.0` etc.
          shopt -s nullglob
          xpkgs=(_output/xpkg/linux_amd64/*.xpkg _output/xpkg/linux_arm64/*.xpkg)
          if [ ${#xpkgs[@]} -ne 2 ]; then
            echo "::error::expected amd64 and arm64 xpkg artifacts, found ${#xpkgs[@]}"
            ls -la _output/ _output/xpkg/ 2>&1 || true
            exit 1
          fi
          IMAGE="ghcr.io/${{ github.repository }}"
          files=$(IFS=,; echo "${xpkgs[*]}")
          echo "Pushing multi-platform package ${files} to ${IMAGE}:v${VERSION}"
          crossplane xpkg push --package-files "${files}" "${IMAGE}:v${VERSION}"
        env:
          VERSION: ${{ steps.version.outputs.version }}
