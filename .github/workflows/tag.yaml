name: Tag

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.1.0)'
        required: true
      message:
        description: 'Tag message'
        required: true

permissions:
  contents: write

jobs:
  tag:
    uses: upbound/official-providers-ci/.github/workflows/provider-tag.yml@8965579a213ba2b249225fa311178ac66f107daf # main
    with:
      version: ${{ github.event.inputs.version }}
      message: ${{ github.event.inputs.message }}

  release:
    needs: tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.inputs.version }}
      - run: gh release create "${{ github.event.inputs.version }}" --title "${{ github.event.inputs.version }}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
