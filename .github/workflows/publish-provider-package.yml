name: Publish Provider Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version string to use while publishing the package (e.g. v1.0.0-alpha.1)"
        default: ''
        required: false
      go-version:
        description: 'Go version to use if building needs to be done'
        default: '1.24'
        required: false

permissions:
  contents: read

jobs:
  publish-provider-package:
    permissions:
      contents: read
      packages: write
    uses: crossplane-contrib/provider-workflows/.github/workflows/publish-provider.yml@451c4dc6ad3691b0a702a997a0ac24e8bbc8bbaa # main
    with:
      repository: provider-upjet-openpanel
      version: ${{ github.event.inputs.version }}
      go-version: ${{ github.event.inputs.go-version }}
      cleanup-disk: true
    secrets:
      GHCR_PAT: ${{ secrets.GITHUB_TOKEN }}
      XPKG_MIRROR_TOKEN: ${{ secrets.XPKG_TOKEN }}
      XPKG_MIRROR_ACCESS_ID: ${{ secrets.XPKG_ACCESS_ID }}

  append-extensions:
    needs: publish-provider-package
    runs-on: ubuntu-latest
    if: ${{ always() && needs.publish-provider-package.result == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Determine version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="${GITHUB_REF_NAME}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Append extensions
        uses: ./.github/actions/append-xpkg-extensions
        with:
          package: xpkg.upbound.io/hops-ops/provider-upjet-openpanel
          version: ${{ steps.version.outputs.version }}
          xpkg-access-id: ${{ secrets.XPKG_ACCESS_ID }}
          xpkg-token: ${{ secrets.XPKG_TOKEN }}
