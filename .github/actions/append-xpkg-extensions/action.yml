name: Append xpkg Extensions
description: Append extensions (e.g. marketplace icons) to a published Crossplane package using `up alpha xpkg append`.

inputs:
  package:
    description: 'Full package reference without the version tag (e.g. xpkg.upbound.io/hops-ops/provider-upjet-openpanel)'
    required: true
  version:
    description: 'Version tag of the package to append extensions to'
    required: true
  extensions-root:
    description: 'Path to the extensions directory'
    required: false
    default: './extensions'
  registry:
    description: 'OCI registry to authenticate against'
    required: false
    default: 'xpkg.upbound.io'
  xpkg-access-id:
    description: 'Robot ID or access ID for registry authentication'
    required: true
  xpkg-token:
    description: 'API token for registry authentication'
    required: true
  up-version:
    description: 'Version of the Up CLI to install'
    required: false
    default: 'v0.47.0'

runs:
  using: composite
  steps:
    - name: Install up CLI
      shell: bash
      env:
        UP_VERSION: ${{ inputs.up-version }}
      run: |
        curl -fsSLo /tmp/up --create-dirs "https://cli.upbound.io/stable/${UP_VERSION}/bin/linux_amd64/up" && \
        chmod +x /tmp/up

    - name: Login to registry
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.xpkg-access-id }}
        password: ${{ inputs.xpkg-token }}

    - name: Append extensions to package
      shell: bash
      run: |
        /tmp/up alpha xpkg append \
          --extensions-root=${{ inputs.extensions-root }} \
          ${{ inputs.package }}:${{ inputs.version }}
